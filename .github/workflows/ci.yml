name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit:legacy
      - run: pnpm check
      - run: pnpm --filter @dredmorpedia/web exec playwright install chromium
      - run: pnpm test:e2e
